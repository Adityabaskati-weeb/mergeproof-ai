name: MergeProof post-merge outcome

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  record-outcome:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      PR_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Record merged outcome
        run: npm run cli -- feedback "$PR_URL" merged -- --repo . --reason "Recorded automatically after GitHub merge" --json > mergeproof-post-merge.json
      - name: Upload outcome
        uses: actions/upload-artifact@v4
        with:
          name: mergeproof-post-merge-outcome
          path: mergeproof-post-merge.json
          if-no-files-found: error
