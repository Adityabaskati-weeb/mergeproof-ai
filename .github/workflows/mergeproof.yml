name: MergeProof evidence gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  mergeproof:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.6
      MERGEPROOF_PROVIDER: openai
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout MergeProof
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Analyze pull request
        id: mergeproof
        shell: bash
        run: |
          set +e
          npm run cli -- analyze "${{ github.event.pull_request.html_url }}" -- --json --publish-check
          status=$?
          if [ "$status" -eq 1 ]; then
            exit 1
          fi
          exit 0
