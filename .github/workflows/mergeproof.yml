name: MergeProof evidence gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_url:
        description: Public GitHub pull request URL to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  mergeproof:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.6
      MERGEPROOF_PROVIDER: openai
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Analyze pull request
        id: mergeproof
        shell: bash
        run: |
          set +e
          PR_URL="${{ github.event.pull_request.html_url || inputs.pr_url }}"
          npm run cli -- analyze "$PR_URL" -- --json --repo . --remember --publish-check --publish-review
          status=$?
          if [ "$status" -eq 1 ]; then
            exit 1
          fi
          exit 0
